<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HRMS Dashboard</title>

    <!-- Google Font -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- AdminLTE -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

    <style>

        /* Hover Animation */

        .small-box {

            transition: 0.3s ease;

            cursor: pointer;

        }

        .small-box:hover {

            transform: translateY(-5px);

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);

        }

        .card {

            transition: 0.3s ease;

        }

        .card:hover {

            transform: translateY(-3px);

            box-shadow: 0 8px 20px rgba(0,0,0,0.12);

        }

        .btn {

            transition: 0.2s ease;

        }

        .btn:hover {

            transform: scale(1.03);

        }

        /* Modal */

        .modal-content {

            border-radius: 20px;

            border: none;

        }

        .modal-body {

            padding: 30px;

        }

        .modal-header,
        .modal-footer {

            padding-left: 30px;

            padding-right: 30px;

        }

        .form-control-lg {

            height: 60px;

            border-radius: 14px;

            font-size: 24px;

        }

        .btn-lg {

            border-radius: 12px;

        }

    </style>

</head>

<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed">

<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">

        <ul class="navbar-nav">

            <li class="nav-item">

                <a class="nav-link"
                   data-widget="pushmenu"
                   href="#">

                    <i class="fas fa-bars"></i>

                </a>

            </li>

        </ul>

    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">

        <!-- Logo -->
        <a href="/"
           class="brand-link text-center">

            <span class="brand-text font-weight-bold">

                HR Dashboard

            </span>

        </a>

        <!-- Sidebar -->
        <div class="sidebar">

            <!-- User Panel -->
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">

                <div class="image">

                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                         class="img-circle elevation-2"
                         alt="User Image">

                </div>

                <div class="info">

                    <a href="#"
                       class="d-block">

                        Admin User

                    </a>

                </div>

            </div>

            <!-- Menu -->
            <nav class="mt-2">

                <ul class="nav nav-pills nav-sidebar flex-column"
                    data-widget="treeview"
                    role="menu">

                    <!-- Dashboard -->
                    <li class="nav-item">

                        <a href="/"
                           class="nav-link {% if request.path == '/' %}active{% endif %}">

                            <i class="nav-icon fas fa-house"></i>

                            <p>Dashboard</p>

                        </a>

                    </li>

                    <!-- Employees -->
                    <li class="nav-item">

                        <a href="/employees"
                           class="nav-link {% if request.path == '/employees' %}active{% endif %}">

                            <i class="nav-icon fas fa-user-group"></i>

                            <p>Employees</p>

                        </a>

                    </li>

                    <!-- Attendance -->
                    <li class="nav-item">

                        <a href="/attendance"
                           class="nav-link {% if request.path == '/attendance' %}active{% endif %}">

                            <i class="nav-icon fas fa-calendar-check"></i>

                            <p>Attendance</p>

                        </a>

                    </li>

                    <!-- Leave -->
                    <li class="nav-item">

                        <a href="/leave"
                           class="nav-link {% if request.path == '/leave' %}active{% endif %}">

                            <i class="nav-icon fas fa-check-circle"></i>

                            <p>Leave Management</p>

                        </a>

                    </li>

                    <!-- Reports -->
                    <li class="nav-item">

                        <a href="/reports"
                           class="nav-link {% if request.path == '/reports' %}active{% endif %}">

                            <i class="nav-icon fas fa-chart-pie"></i>

                            <p>Reports</p>

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </aside>

    <!-- Main Content -->
    <div class="content-wrapper">

        {% block content %}
        {% endblock %}

    </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- AdminLTE -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>
